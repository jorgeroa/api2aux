name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # TODO: switch to egress-policy: block with an allowed-endpoints list
      #       once audit data has been collected. Audit mode only logs outbound
      #       connections — it does not prevent exfiltration (CVE-2025-32955).
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Hard-fails on any moderate+ advisory, even if no fix exists yet.
      # If this blocks CI on an unfixable vuln, add a temporary override in
      # pnpm-workspace.yaml pinning the current version until a patch ships.
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level moderate

      - name: Verify package signatures
        run: npm audit signatures

      - run: pnpm -r build
      - run: pnpm -r test:run
